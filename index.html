<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#fdf6ee"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Enduro Museum"/>
<title>Enduro Museum – Kalender</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#fdf6ee;color:#3d1f00;font-family:'Nunito',sans-serif;min-height:100vh}
#wrap{max-width:520px;margin:0 auto;padding:12px 14px 80px}

/* PIN */
#pin{position:fixed;inset:0;background:#fdf6ee;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.pin-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,#e07b39,#c0392b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.pin-sub{font-size:13px;color:#a06030;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(180,100,30,0.25);background:transparent;transition:.2s}
.pin-dot.on{background:#e07b39;border-color:#e07b39}
.pin-dot.err{background:#c0392b;border-color:#c0392b}
.pin-grid{display:grid;grid-template-columns:repeat(3,80px);gap:10px}
.pk{height:64px;border-radius:13px;border:1.5px solid rgba(180,100,30,0.15);background:#fff8f2;color:#3d1f00;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;cursor:pointer;transition:.15s}
.pk:active{background:#fde8cc;transform:scale(.93)}
.pk.del{font-size:18px;color:#a06030}
.pk.empty{border:none;background:transparent;cursor:default}
#pin-err{color:#c0392b;font-size:12px;font-weight:700;margin-top:12px;min-height:18px}

/* HEADER */
.hdr{text-align:center;margin-bottom:16px}
.hdr-ey{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#b85c1a;font-weight:700;margin-bottom:3px}
.hdr-h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,#e07b39,#c0392b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* TABS */
.tabs{display:flex;background:#fff8f2;border-radius:12px;padding:3px;margin-bottom:14px;gap:2px;border:1px solid rgba(180,100,30,0.1)}
.tab{flex:1;padding:9px 2px;border:none;background:none;color:rgba(100,55,10,0.5);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border-radius:10px;transition:.2s}
.tab.on{background:#fef0e0;color:#3d1f00}

/* CARD */
.card{background:#fff8f2;border:1px solid rgba(180,100,30,0.12);border-radius:14px;padding:16px;margin-bottom:12px}
.card-lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(100,55,10,0.45);margin-bottom:10px}

/* MONTH NAV */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mnav-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.mnav-btn{width:32px;height:32px;border:1px solid rgba(180,100,30,0.15);background:#fef0e0;border-radius:9px;color:#3d1f00;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* CALENDAR */
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-head span{text-align:center;font-size:10px;font-weight:700;color:rgba(100,55,10,0.4)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{min-height:58px;border-radius:8px;border:1px solid rgba(180,100,30,0.1);background:#fef0e0;display:flex;flex-direction:column;padding:3px;cursor:pointer;overflow:hidden;transition:.15s}
.cal-cell:active{opacity:.7}
.cal-cell.emp{background:transparent;border-color:transparent;cursor:default}
.cal-cell.tod{border-color:#e07b39;background:rgba(224,123,57,0.1)}
.cal-cell.hev{background:#fff3e8;border-color:rgba(224,123,57,0.35)}
.cal-cell.hsh{background:#f0faf4;border-color:rgba(46,125,82,0.3)}
.day-n{font-size:10px;font-weight:800;color:rgba(100,55,10,0.4);line-height:1}
.tod .day-n{color:#e07b39}
.ev-lbl{font-size:7.5px;font-weight:800;border-radius:3px;padding:1px 3px;margin-top:2px;background:rgba(224,123,57,0.18);color:#7a3800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-lbl{font-size:7.5px;font-weight:800;border-radius:3px;padding:1px 3px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* UPCOMING */
.up-row{background:#fef0e0;border:1px solid rgba(180,100,30,0.12);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.up-top{display:flex;align-items:flex-start;gap:10px}
.up-dbox{background:#e07b39;border-radius:7px;padding:5px 8px;text-align:center;min-width:38px;flex-shrink:0}
.up-dd{font-size:16px;font-weight:900;color:#fff;line-height:1;font-family:'Syne',sans-serif}
.up-dm{font-size:8px;font-weight:700;color:rgba(255,255,255,.85);text-transform:uppercase}
.up-title{font-size:14px;font-weight:800;margin-bottom:2px}
.up-time{font-size:11px;color:rgba(100,55,10,.55)}
.up-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.up-badge{font-size:10px;font-weight:700;border-radius:9px;padding:3px 8px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(61,31,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:12px 12px 20px}
.sheet{background:#fff8f2;border:1px solid rgba(180,100,30,.12);border-radius:22px 22px 18px 18px;padding:22px 18px 18px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.sh-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:3px}
.sh-sub{font-size:12px;color:rgba(100,55,10,.5);margin-bottom:16px}
.sh-div{border:none;border-top:1px solid rgba(180,100,30,.1);margin:12px 0}

/* MEMBERS IN MODAL */
.m-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(46,125,82,.07);border:1.5px solid rgba(46,125,82,.25);margin-bottom:6px}
.m-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.m-name{font-size:14px;font-weight:700;flex:1}
.m-time{font-size:12px;color:#2e7d52;font-weight:600}
.m-out{background:none;border:1px solid rgba(192,57,43,.25);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;color:#c0392b}
.eintragen-btn{width:100%;padding:13px;background:#fff8f2;border:2px dashed rgba(224,123,57,.5);border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#e07b39;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}

/* MEMBER PICKER */
.pick-btn{width:100%;display:flex;align-items:center;gap:10px;padding:12px 13px;border-radius:10px;background:#fef0e0;border:1px solid rgba(180,100,30,.15);margin-bottom:7px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#3d1f00;cursor:pointer}

/* FORM */
.f-group{margin-bottom:12px}
.f-lbl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(100,55,10,.45);margin-bottom:5px;display:block}
.f-inp{width:100%;background:#fef0e0;border:1px solid rgba(180,100,30,.15);border-radius:9px;padding:10px 13px;color:#3d1f00;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600}
.f-row{display:flex;gap:8px}
.f-row .f-group{flex:1}
.btn-pri{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#e07b39,#c0392b);color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px}
.btn-suc{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#2e7d52,#1a5c35);color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px}
.btn-gh{width:100%;padding:12px;border:1px solid rgba(180,100,30,.15);border-radius:10px;background:#fef0e0;color:rgba(100,55,10,.6);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-del{width:100%;padding:10px;border:1px solid rgba(192,57,43,.25);border-radius:10px;background:rgba(192,57,43,.06);color:#c0392b;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}

/* CHIPS */
.chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{display:flex;align-items:center;gap:5px;padding:5px 9px 5px 7px;border-radius:16px;font-size:12px;font-weight:700;background:#fef0e0;border:1px solid rgba(180,100,30,.15)}
.chip-x{background:none;border:none;color:rgba(100,55,10,.4);cursor:pointer;font-size:15px;padding:0 0 0 2px}
.add-row{display:flex;gap:7px;margin-top:8px}
.add-row input{flex:1;background:#fef0e0;border:1px solid rgba(180,100,30,.15);border-radius:9px;padding:9px 12px;color:#3d1f00;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600}
.add-row button{padding:9px 14px;background:linear-gradient(135deg,#e07b39,#c0392b);border:none;border-radius:9px;color:#fff;font-weight:800;font-size:18px;cursor:pointer}

/* SYNC BAR */
.sbar{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(100,55,10,.5);margin-bottom:10px}
.sdot{width:7px;height:7px;border-radius:50%;background:#2e7d52;flex-shrink:0}

/* BDAY */
.bk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.bk-cell{min-height:46px;border-radius:7px;border:1px solid rgba(180,100,30,.1);background:#fef0e0;display:flex;flex-direction:column;padding:3px;cursor:pointer;overflow:hidden}
.bk-cell.hasbday{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.07)}
.bkn{font-size:7.5px;font-weight:800;color:#9b1c10;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bday-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(180,100,30,.08)}
.bday-row:last-child{border-bottom:none}
.bday-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:rgba(192,57,43,.1);color:#9b1c10;border:1.5px solid rgba(192,57,43,.25)}
.bday-in{font-size:10px;font-weight:700;color:#9b1c10;background:rgba(192,57,43,.1);border-radius:5px;padding:2px 7px;flex-shrink:0}

/* ADMIN */
.admin-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(192,57,43,.1);color:#c0392b;border:1px solid rgba(192,57,43,.25);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:800;margin-bottom:10px}

/* STAT */
.stat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(180,100,30,.08)}
.stat-row:last-child{border-bottom:none}

.empty{text-align:center;padding:24px;color:rgba(100,55,10,.45);font-size:13px}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:rgba(100,55,10,.45)}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin">
  <div class="pin-title">Enduro Museum</div>
  <div class="pin-sub">Bitte PIN eingeben</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
    <div class="pin-dot" id="dot4"></div>
  </div>
  <div class="pin-grid">
    <button class="pk" onclick="PT('1')">1</button>
    <button class="pk" onclick="PT('2')">2</button>
    <button class="pk" onclick="PT('3')">3</button>
    <button class="pk" onclick="PT('4')">4</button>
    <button class="pk" onclick="PT('5')">5</button>
    <button class="pk" onclick="PT('6')">6</button>
    <button class="pk" onclick="PT('7')">7</button>
    <button class="pk" onclick="PT('8')">8</button>
    <button class="pk" onclick="PT('9')">9</button>
    <div class="pk empty"></div>
    <button class="pk" onclick="PT('0')">0</button>
    <button class="pk del" onclick="PD()">⌫</button>
  </div>
  <div id="pin-err"></div>
</div>

<div id="wrap" style="display:none">
  <div class="hdr">
    <div class="hdr-ey">Deutsches Enduro Museum</div>
    <div class="hdr-h1">Kalender & Dienstplan</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div class="ov" id="modal" style="display:none" onclick="closeModal()">
  <div class="sheet" id="modal-sheet" onclick="event.stopPropagation()"></div>
</div>

<script>
// ─── KONSTANTEN ───────────────────────────────────
const MONATE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONATE_K=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const WOCHENTAGE=['Mo','Di','Mi','Do','Fr','Sa','So'];
const FARBEN=['#c0392b','#e07b39','#2e7d52','#1d6fa4','#7b2d8b','#b5721a','#2c6e6e','#8b4513','#4a5568','#c2185b'];
const PIN='09405';
const ADMIN_PW='museum2024';
const BIN_ID='69e3a735856a68218949ebf2';
const API_KEY='$2a$10$de41ugq7EutRChiTkZy4oeXF4277osh.7O44kb.a/AqwqeAXw51Ii';

// ─── STATE ────────────────────────────────────────
var _letzteAenderung=0;
var S={
  tab:'kal',
  jahr:new Date().getFullYear(), monat:new Date().getMonth(),
  bjahr:new Date().getFullYear(), bmonat:new Date().getMonth(),
  // events: [{id,titel,datum,von,bis,beschreibung}]
  events:[],
  // eintraege: {'YYYY-MM-DD': [{name,color,von,bis,evId}]}
  eintraege:{},
  members:[],
  birthdays:[],
  isAdmin:false,
  lastSync:null
};

// Lade lokale Daten
try{
  var ls=JSON.parse(localStorage.getItem('em4')||'{}');
  if(ls.events) S.events=ls.events;
  if(ls.eintraege) S.eintraege=ls.eintraege;
  if(ls.members) S.members=ls.members;
  if(ls.birthdays) S.birthdays=ls.birthdays;
  if(ls.isAdmin) S.isAdmin=ls.isAdmin;
}catch(e){}

function lokal(){
  localStorage.setItem('em4',JSON.stringify({
    events:S.events, eintraege:S.eintraege,
    members:S.members, birthdays:S.birthdays, isAdmin:S.isAdmin
  }));
}

// ─── CLOUD SYNC ───────────────────────────────────
async function hoch(){
  _letzteAenderung=Date.now();
  try{
    await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify({events:S.events,eintraege:S.eintraege,members:S.members,birthdays:S.birthdays})
    });
    S.lastSync=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  }catch(e){console.log('Sync hoch:',e);}
}

async function runter(){
  try{
    var r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)return;
    var j=await r.json();
    var d=j.record;
    if(d.events) S.events=d.events;
    if(d.eintraege) S.eintraege=d.eintraege;
    if(d.members) S.members=d.members;
    if(d.birthdays) S.birthdays=d.birthdays;
    S.lastSync=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    lokal();
  }catch(e){console.log('Sync runter:',e);}
}

// ─── HILFSFUNKTIONEN ──────────────────────────────
function dk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function off(y,m){var d=new Date(y,m,1).getDay();return d===0?6:d-1}
function heute(){var n=new Date();return dk(n.getFullYear(),n.getMonth(),n.getDate())}
function istH(y,m,d){return heute()===dk(y,m,d)}
function ini(n){return n.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2)}
function evAmTag(key){return S.events.filter(function(e){return e.datum===key})}
function shAmTag(key){return S.eintraege[key]||[]}
function bdAmTag(m,d){return S.birthdays.filter(function(b){return b.monat===m+1&&b.tag===d})}
function tageNoch(b){
  var h=new Date();var t=new Date(h.getFullYear(),h.getMonth(),h.getDate());
  var n=new Date(t.getFullYear(),b.monat-1,b.tag);
  if(n<t)n=new Date(t.getFullYear()+1,b.monat-1,b.tag);
  return Math.round((n-t)/86400000);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

// ─── PIN ──────────────────────────────────────────
var _p='';
function _upd(){
  for(var i=0;i<5;i++){
    var d=document.getElementById('dot'+i);
    if(d){d.className='pin-dot'+(i<_p.length?' on':'');}
  }
}
function PT(d){
  _p+=d;_upd();
  if(_p.length===5){
    if(_p===PIN){
      localStorage.setItem('pin_ok','1');
      localStorage.setItem('pin_ts',Date.now().toString());
      document.getElementById('pin').style.display='none';
      document.getElementById('wrap').style.display='block';
      zeige();
      runter().then(function(){zeige();});
    } else {
      for(var i=0;i<5;i++){var d2=document.getElementById('dot'+i);if(d2)d2.className='pin-dot err';}
      document.getElementById('pin-err').textContent='Falscher PIN';
      setTimeout(function(){_p='';_upd();document.getElementById('pin-err').textContent='';},900);
    }
  }
}
function PD(){if(_p.length>0){_p=_p.slice(0,-1);_upd();}}

// Beim Laden prüfen ob PIN noch gültig
(function(){
  var ok=localStorage.getItem('pin_ok')==='1';
  var ts=parseInt(localStorage.getItem('pin_ts')||'0');
  if(ok&&Date.now()-ts<86400000){
    document.getElementById('pin').style.display='none';
    document.getElementById('wrap').style.display='block';
    zeige();
    runter().then(function(){zeige();});
  }
})();

// ─── MODAL ────────────────────────────────────────
function openModal(html){
  document.getElementById('modal-sheet').innerHTML=html;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){
  document.getElementById('modal').style.display='none';
  document.getElementById('modal-sheet').innerHTML='';
}

// ─── RENDER ───────────────────────────────────────
function zeige(){
  // Tabs
  var tabs=['kal','geb','team'];
  var labels=['📅 Kalender','🎂 Geburtstage','👥 Team'];
  var th='';
  for(var i=0;i<tabs.length;i++){
    th+='<button class="tab'+(S.tab===tabs[i]?' on':'')+'" onclick="ST(\''+tabs[i]+'\')">'+labels[i]+'</button>';
  }
  document.getElementById('tabs').innerHTML=th;

  // Content
  var c='';
  if(S.tab==='kal') c=zeigeKal();
  else if(S.tab==='geb') c=zeigeGeb();
  else if(S.tab==='team') c=zeigeTeam();
  document.getElementById('content').innerHTML=c;
}

// ─── KALENDER TAB ─────────────────────────────────
function zeigeKal(){
  var y=S.jahr, m=S.monat;
  var d=dim(y,m), o=off(y,m);
  var cells='';
  for(var i=0;i<o;i++) cells+='<div class="cal-cell emp"></div>';
  for(var dd=1;dd<=d;dd++){
    var key=dk(y,m,dd);
    var evts=evAmTag(key);
    var sh=shAmTag(key);
    var cls='cal-cell'+(istH(y,m,dd)?' tod':'')+(evts.length?' hev':'')+(sh.length?' hsh':'');
    var inner='<span class="day-n">'+dd+'</span>';
    for(var e=0;e<evts.length&&e<2;e++) inner+='<div class="ev-lbl">📌 '+evts[e].titel+'</div>';
    // Zeige einzigartige Namen
    var namen=[];
    for(var s=0;s<sh.length;s++){if(namen.indexOf(sh[s].name)<0)namen.push(sh[s].name);}
    for(var n=0;n<namen.length&&n<2;n++){
      var mb=getMember(namen[n]);
      inner+='<div class="sh-lbl" style="background:'+mb.color+'22;color:'+mb.color+'">'+namen[n]+'</div>';
    }
    cells+='<div class="'+cls+'" onclick="tagOeffnen(\''+key+'\')">'+inner+'</div>';
  }

  // Sync status
  var sb='<div class="sbar"><div class="sdot"></div><span>'+

// ─── TAG ÖFFNEN ───────────────────────────────────
function tagOeffnen(key){
  var parts=key.split('-');
  var y=parseInt(parts[0]),m=parseInt(parts[1]),d=parseInt(parts[2]);
  var wt=new Date(y,m-1,d).getDay();
  var wtn=['So','Mo','Di','Mi','Do','Fr','Sa'][wt];
  var evts=evAmTag(key);
  var sh=shAmTag(key);

  var html='<div class="sh-title">'+wtn+', '+d+'. '+MONATE[m-1]+' '+y+'</div>';
  html+='<div class="sh-sub">'+(evts.length?evts.length+' Veranstaltung'+(evts.length>1?'en':''):'Normaler Tag')+'</div>';

  // Veranstaltungen
  for(var i=0;i<evts.length;i++){
    var ev=evts[i];
    var evSh=sh.filter(function(x){return x.evId===ev.id;});
    html+='<div style="background:rgba(224,123,57,.06);border:1px solid rgba(224,123,57,.25);border-radius:12px;padding:14px;margin-bottom:12px">';
    html+='<div style="font-size:17px;font-weight:800;margin-bottom:3px">📌 '+ev.titel+'</div>';
    html+='<div style="font-size:13px;color:rgba(100,55,10,.55);margin-bottom:'+(ev.beschreibung?'5px':'12px')+'">🕐 '+ev.von+' – '+ev.bis+' Uhr</div>';
    if(ev.beschreibung) html+='<div style="font-size:12px;color:rgba(100,55,10,.5);margin-bottom:12px;line-height:1.5">'+ev.beschreibung+'</div>';
    if(S.isAdmin) html+='<button onclick="evBearbeiten(\''+ev.id+'\')" style="background:none;border:1px solid rgba(180,100,30,.15);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:rgba(100,55,10,.5);margin-bottom:12px">✏️ Bearbeiten</button>';
    html+='<div style="font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(100,55,10,.45);margin-bottom:8px">Eingetragen ('+evSh.length+')</div>';
    // Eingetragene Mitglieder anzeigen
    if(evSh.length===0){
      html+='<div style="font-size:13px;color:rgba(100,55,10,.45);margin-bottom:10px">Noch niemand eingetragen</div>';
    } else {
      for(var s=0;s<evSh.length;s++){
        var e2=evSh[s];
        var mb=getMember(e2.name);
        html+='<div class="m-row">'+
          '<div class="m-dot" style="background:'+mb.color+'"></div>'+
          '<div style="flex:1"><div class="m-name">'+e2.name+'</div>'+
          '<div class="m-time">🕐 '+e2.von+' – '+e2.bis+' Uhr</div></div>'+
          '<button class="m-out" onclick="austragen(\''+key+'\',\''+e2.name+'\',\''+ev.id+'\')">Austragen</button>'+
          '</div>';
      }
    }
    html+='<button class="eintragen-btn" onclick="mitgliedWaehlen(\''+key+'\',\''+ev.id+'\')">+ Ich trage mich ein</button>';
    html+='</div>';
  }

  // Abschnitt für normalen Betrieb (immer sichtbar)
  var ohneEv=sh.filter(function(x){return !x.evId||x.evId===''});
  html+='<div style="background:rgba(46,125,82,.06);border:1px solid rgba(46,125,82,.2);border-radius:12px;padding:14px;margin-bottom:12px">';
  html+='<div style="font-size:15px;font-weight:800;margin-bottom:3px">🏛️ Museumsbetrieb</div>';
  html+='<div style="font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(100,55,10,.45);margin-bottom:8px">Anwesend ('+ohneEv.length+')</div>';
  if(ohneEv.length===0){
    html+='<div style="font-size:13px;color:rgba(100,55,10,.45);margin-bottom:10px">Noch niemand eingetragen</div>';
  } else {
    for(var s2=0;s2<ohneEv.length;s2++){
      var e3=ohneEv[s2];
      var mb3=getMember(e3.name);
      html+='<div class="m-row">'+
        '<div class="m-dot" style="background:'+mb3.color+'"></div>'+
        '<div style="flex:1"><div class="m-name">'+e3.name+'</div>'+
        '<div class="m-time">🕐 '+e3.von+' – '+e3.bis+' Uhr</div></div>'+
        '<button class="m-out" onclick="austragen(\''+key+'\',\''+e3.name+'\',\'\')">Austragen</button>'+
        '</div>';
    }
  }
  html+='<button class="eintragen-btn" onclick="mitgliedWaehlen(\''+key+'\',\'\')">+ Ich trage mich ein</button>';
  html+='</div>';

  if(S.isAdmin){
    html+='<button class="btn-gh" onclick="neueVeranstaltungAmTag(\''+key+'\')">+ Veranstaltung an diesem Tag erstellen</button>';
  }
  html+='<button class="btn-gh" onclick="closeModal()">Schließen</button>';
  openModal(html);
}

// ─── MITGLIED WÄHLEN & EINTRAGEN ──────────────────
function mitgliedWaehlen(key, evId){
  var sh=shAmTag(key);
  var bereitsEin=sh.filter(function(x){return x.evId===(evId||'');}).map(function(x){return x.name;});
  var verfuegbar=S.members.filter(function(m){return bereitsEin.indexOf(m.name)<0;});

  var html='<div class="sh-title">Wer bist du?</div>';
  html+='<div class="sh-sub">Wähle deinen Namen – dann Uhrzeit eingeben</div>';
  if(verfuegbar.length===0){
    html+='<div class="empty">Alle Mitglieder sind bereits eingetragen!</div>';
  } else {
    for(var i=0;i<verfuegbar.length;i++){
      var m=verfuegbar[i];
      html+='<button class="pick-btn" onclick="zeitEingabe(\''+key+'\',\''+evId+'\',\''+m.name+'\')">'+
        '<div style="width:12px;height:12px;border-radius:50%;background:'+m.color+'"></div>'+
        m.name+
        '<span style="margin-left:auto;color:#e07b39">→</span>'+
        '</button>';
    }
  }
  html+='<div class="sh-div"></div>';
  html+='<button class="btn-gh" onclick="tagOeffnen(\''+key+'\')">Zurück</button>';
  openModal(html);
}

function zeitEingabe(key, evId, name){
  var ev=S.events.find(function(e){return e.id===evId;});
  var vonDef=ev?ev.von:'10:00';
  var bisDef=ev?ev.bis:'18:00';
  var mb=getMember(name);

  var html='<div class="sh-title" style="color:'+mb.color+'">'+name+'</div>';
  html+='<div class="sh-sub">'+(ev?'Für „'+ev.titel+'"':'Museumsbetrieb')+' · Für mehrere Tage: Bis-Datum ändern</div>';
  html+='<div class="f-row">'+
    '<div class="f-group"><label class="f-lbl">Von Datum</label><input class="f-inp" type="date" id="zDatVon" value="'+key+'"/></div>'+
    '<div class="f-group"><label class="f-lbl">Bis Datum</label><input class="f-inp" type="date" id="zDatBis" value="'+key+'"/></div>'+
    '</div>';
  html+='<div class="f-row">'+
    '<div class="f-group"><label class="f-lbl">Von Uhrzeit</label><input class="f-inp" type="time" id="zVon" value="'+vonDef+'"/></div>'+
    '<div class="f-group"><label class="f-lbl">Bis Uhrzeit</label><input class="f-inp" type="time" id="zBis" value="'+bisDef+'"/></div>'+
    '</div>';
  html+='<button class="btn-suc" id="eintrBtn">✓ Eintragen</button>';
  html+='<button class="btn-gh" onclick="mitgliedWaehlen(\''+key+'\',\''+evId+'\')">Zurück</button>';
  openModal(html);

  document.getElementById('eintrBtn').onclick=function(){
    var dVon=document.getElementById('zDatVon').value||key;
    var dBis=document.getElementById('zDatBis').value||dVon;
    var von=document.getElementById('zVon').value||vonDef;
    var bis=document.getElementById('zBis').value||bisDef;
    eintragenMehrfach(dVon,dBis,evId,name,von,bis);
  };
}

function eintragenMehrfach(dVon,dBis,evId,name,von,bis){
  var start=new Date(dVon);
  var ende=new Date(dBis);
  if(ende<start){alert('Bis-Datum muss nach Von-Datum liegen!');return;}
  var mb=getMember(name);
  var cur=new Date(start);
  var anzahl=0;
  while(cur<=ende){
    var y=cur.getFullYear();
    var m=cur.getMonth();
    var d=cur.getDate();
    var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(!S.eintraege[k]) S.eintraege[k]=[];
    S.eintraege[k]=S.eintraege[k].filter(function(x){return !(x.name===name&&(x.evId||'')===(evId||''));});
    S.eintraege[k].push({name:name,color:mb.color,von:von,bis:bis,evId:evId||''});
    anzahl++;
    cur.setDate(cur.getDate()+1);
  }
  lokal();
  hoch();
  tagOeffnen(dVon);
  if(anzahl>1)setTimeout(function(){alert('✅ '+anzahl+' Tage eingetragen!');},300);
}

function eintragen(key,evId,name,von,bis){
  var mb=getMember(name);
  if(!S.eintraege[key]) S.eintraege[key]=[];
  // Alten Eintrag für selbe Person+Event entfernen
  S.eintraege[key]=S.eintraege[key].filter(function(x){return !(x.name===name&&(x.evId||'')===(evId||''));});
  S.eintraege[key].push({name:name,color:mb.color,von:von,bis:bis,evId:evId||''});
  lokal();
  hoch();
  tagOeffnen(key); // Modal aktualisieren
}

function austragen(key,name,evId){
  if(!S.eintraege[key])return;
  S.eintraege[key]=S.eintraege[key].filter(function(x){return !(x.name===name&&(x.evId||'')===(evId||''));});
  lokal();
  hoch();
  tagOeffnen(key);
}

function neueVeranstaltung(){neueVeranstaltungAmTag(heute());}
function neueVeranstaltungAmTag(key){
  var html='<div class="sh-title">📌 Neue Veranstaltung</div>'+
    '<div class="sh-sub">Nur für Admins · Für mehrere Tage: Bis-Datum ausfüllen</div>'+
    '<div class="f-group"><label class="f-lbl">Titel</label><input class="f-inp" id="evT" placeholder="z.B. Motorradtreffen"/></div>'+
    '<div class="f-row">'+
    '<div class="f-group"><label class="f-lbl">Von Datum</label><input class="f-inp" type="date" id="evD" value="'+key+'"/></div>'+
    '<div class="f-group"><label class="f-lbl">Bis Datum (optional)</label><input class="f-inp" type="date" id="evDB" value="'+key+'"/></div>'+
    '</div>'+
    '<div class="f-row">'+
    '<div class="f-group"><label class="f-lbl">Von Uhrzeit</label><input class="f-inp" type="time" id="evV" value="10:00"/></div>'+
    '<div class="f-group"><label class="f-lbl">Bis Uhrzeit</label><input class="f-inp" type="time" id="evB" value="18:00"/></div>'+
    '</div>'+
    '<div class="f-group"><label class="f-lbl">Beschreibung (optional)</label><input class="f-inp" id="evBe" placeholder="Kurze Info…"/></div>'+
    '<button class="btn-pri" id="evSvBtn">💾 Speichern</button>'+
    '<button class="btn-gh" onclick="closeModal()">Abbrechen</button>';
  openModal(html);
  document.getElementById('evSvBtn').onclick=function(){
    var t=document.getElementById('evT').value.trim();
    var d=document.getElementById('evD').value;
    var dBis=document.getElementById('evDB').value||d;
    var v=document.getElementById('evV').value;
    var b=document.getElementById('evB').value;
    var be=document.getElementById('evBe').value.trim();
    if(!t||!d){alert('Bitte Titel und Datum angeben!');return;}
    // Erstelle einen Eintrag pro Tag im Bereich
    var start=new Date(d);
    var ende=new Date(dBis);
    if(ende<start){alert('Bis-Datum muss nach Von-Datum liegen!');return;}
    var cur=new Date(start);
    var anzahl=0;
    while(cur<=ende){
      var y=cur.getFullYear();
      var m=cur.getMonth();
      var dd=cur.getDate();
      var dKey=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
      S.events.push({id:uid(),titel:t,datum:dKey,von:v,bis:b,beschreibung:be});
      anzahl++;
      cur.setDate(cur.getDate()+1);
    }
    S.events.sort(function(a,b2){return a.datum.localeCompare(b2.datum);});
    lokal();hoch();closeModal();zeige();
    if(anzahl>1)alert('✅ '+anzahl+' Tage eingetragen!');
  };
}

function evBearbeiten(evId){
  var ev=S.events.find(function(e){return e.id===evId;});
  if(!ev)return;
  var html='<div class="sh-title">✏️ Veranstaltung bearbeiten</div>'+
    '<div class="f-group"><label class="f-lbl">Titel</label><input class="f-inp" id="evT" value="'+ev.titel+'"/></div>'+
    '<div class="f-group"><label class="f-lbl">Datum</label><input class="f-inp" type="date" id="evD" value="'+ev.datum+'"/></div>'+
    '<div class="f-row">'+
    '<div class="f-group"><label class="f-lbl">Von</label><input class="f-inp" type="time" id="evV" value="'+ev.von+'"/></div>'+
    '<div class="f-group"><label class="f-lbl">Bis</label><input class="f-inp" type="time" id="evB" value="'+ev.bis+'"/></div>'+
    '</div>'+
    '<div class="f-group"><label class="f-lbl">Beschreibung</label><input class="f-inp" id="evBe" value="'+(ev.beschreibung||'')+'"/></div>'+
    '<button class="btn-pri" id="evSvBtn">💾 Speichern</button>'+
    '<button class="btn-del" id="evDelBtn">🗑️ Löschen</button>'+
    '<button class="btn-gh" onclick="closeModal()">Abbrechen</button>';
  openModal(html);
  document.getElementById('evSvBtn').onclick=function(){
    ev.titel=document.getElementById('evT').value.trim();
    ev.datum=document.getElementById('evD').value;
    ev.von=document.getElementById('evV').value;
    ev.bis=document.getElementById('evB').value;
    ev.beschreibung=document.getElementById('evBe').value.trim();
    lokal();hoch();closeModal();zeige();
  };
  document.getElementById('evDelBtn').onclick=function(){
    if(!confirm('Veranstaltung wirklich löschen?'))return;
    S.events=S.events.filter(function(e){return e.id!==evId;});
    lokal();hoch();closeModal();zeige();
  };
}

function zeigeGeb(){
  var y=S.bjahr, m=S.bmonat, d=dim(y,m), o=off(y,m);
  var cells='';
  for(var i=0;i<o;i++) cells+='<div class="bk-cell" style="background:transparent;border-color:transparent"></div>';
  for(var dd=1;dd<=d;dd++){
    var bds=bdAmTag(m,dd);
    var cls='bk-cell'+(bds.length?' hasbday':'');
    var inn='<span class="day-n" style="color:'+(bds.length?'#9b1c10':'rgba(100,55,10,.4)')+'">'+dd+'</span>';
    for(var b=0;b<bds.length;b++) inn+='<div class="bkn">🎂 '+bds[b].name+'</div>';
    cells+='<div class="'+cls+'">'+inn+'</div>';
  }

  var sortiert=S.birthdays.slice().map(function(b,i){return Object.assign({},b,{idx:i,tage:tageNoch(b)});});
  sortiert.sort(function(a,b){return a.tage-b.tage;});
  var rows='';
  for(var i=0;i<Math.min(sortiert.length,12);i++){
    var b=sortiert[i];
    rows+='<div class="bday-row">'+
      '<div class="bday-av">'+ini(b.name)+'</div>'+
      '<div style="flex:1"><div style="font-size:14px;font-weight:700">'+b.name+'</div>'+
      '<div style="font-size:11px;color:rgba(100,55,10,.5)">'+b.tag+'.'+b.monat+'.'+(b.jahr?' '+b.jahr:'')+
      (b.tage===0?' 🎉':'')+'</div></div>'+
      '<div class="bday-in">'+(b.tage===0?'Heute 🎉':'in '+b.tage+'d')+'</div>'+
      '<button onclick="geburtstagDel('+b.idx+')" style="background:none;border:none;color:rgba(100,55,10,.35);cursor:pointer;font-size:13px;margin-left:6px">✕</button>'+
      '</div>';
  }

  return '<div class="card">'+
    '<div class="card-lbl">Geburtstagskalender</div>'+
    '<div class="mnav">'+
    '<button class="mnav-btn" onclick="VBM()">‹</button>'+
    '<span class="mnav-title">'+MONATE[m]+' '+y+'</span>'+
    '<button class="mnav-btn" onclick="NBM()">›</button>'+
    '</div>'+
    '<div class="cal-head"><span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span></div>'+
    '<div class="bk-grid">'+cells+'</div>'+
    '</div>'+
    '<button class="btn-pri" onclick="geburtstagHinzu()">🎂 Geburtstag eintragen</button>'+
    '<div class="card"><div class="card-lbl">Nächste Geburtstage</div>'+
    (sortiert.length?rows:'<div class="empty">Noch keine Geburtstage eingetragen</div>')+
    '</div>';
}

  document.getElementById('bdSvBtn').onclick=function(){
    var n=document.getElementById('bdN').value.trim();
    var d=document.getElementById('bdD').value;
    if(!n||!d){alert('Bitte Name und Datum eingeben!');return;}
    var p=d.split('-');
    var e={name:n,monat:parseInt(p[1]),tag:parseInt(p[2])};
    if(parseInt(p[0])>1900)e.jahr=parseInt(p[0]);
    S.birthdays.push(e);
    lokal();hoch();closeModal();zeige();
  };
}
function geburtstagDel(i){
  if(!confirm('Geburtstag löschen?'))return;
  S.birthdays.splice(i,1);lokal();hoch();zeige();
}

// ─── TEAM ─────────────────────────────────────────
function zeigeTeam(){
  var chips='';
  for(var i=0;i<S.members.length;i++){
    var m=S.members[i];
    chips+='<div class="chip"><div style="width:8px;height:8px;border-radius:50%;background:'+m.color+'"></div>'+m.name+
      '<button class="chip-x" onclick="memberDel(\''+m.name+'\')">×</button></div>';
  }
  var stats='';
  for(var i=0;i<S.members.length;i++){
    var m=S.members[i];
    var cnt=0;
    for(var k in S.eintraege) cnt+=S.eintraege[k].filter(function(x){return x.name===m.name;}).length;
    stats+='<div class="stat-row">'+
      '<div style="width:9px;height:9px;border-radius:50%;background:'+m.color+'"></div>'+
      '<span style="flex:1;font-weight:700">'+m.name+'</span>'+
      '<span style="font-size:12px;color:rgba(100,55,10,.5)">'+cnt+' Einträge</span></div>';
  }
  return '<div class="card"><div class="card-lbl">Mitglieder</div>'+
    '<div class="chip-list">'+chips+'</div>'+
    '<div class="add-row"><input id="nmI" type="text" placeholder="Name hinzufügen …"/><button onclick="memberAdd()">+</button></div>'+
    '</div>'+
    '<div class="card"><div class="card-lbl">Statistik</div>'+(stats||'<div class="empty">Keine Mitglieder</div>')+'</div>';
}
function memberAdd(){
  var n=document.getElementById('nmI').value.trim();
  if(!n||S.members.find(function(m){return m.name===n;}))return;
  S.members.push({name:n,color:FARBEN[S.members.length%FARBEN.length]});
  lokal();hoch();zeige();
}
function memberDel(name){
  if(!confirm(name+' entfernen?'))return;
  S.members=S.members.filter(function(m){return m.name!==name;});
  for(var k in S.eintraege) S.eintraege[k]=S.eintraege[k].filter(function(x){return x.name!==name;});
  lokal();hoch();zeige();
}
function getMember(name){
  return S.members.find(function(m){return m.name===name;})||{color:'#888'};
}

// ─── NAVIGATION ───────────────────────────────────
function ST(t){S.tab=t;zeige();}
function PM(){var d=new Date(S.jahr,S.monat-1);S.jahr=d.getFullYear();S.monat=d.getMonth();zeige();}
function NM(){var d=new Date(S.jahr,S.monat+1);S.jahr=d.getFullYear();S.monat=d.getMonth();zeige();}
function VBM(){var d=new Date(S.bjahr,S.bmonat-1);S.bjahr=d.getFullYear();S.bmonat=d.getMonth();zeige();}
function NBM(){var d=new Date(S.bjahr,S.bmonat+1);S.bjahr=d.getFullYear();S.bmonat=d.getMonth();zeige();}
function syncNeu(){runter().then(function(){zeige();});}

// ─── ECHTZEIT-SYNC (alle 4 Sek) ──────────────────
var _letzteAenderung=0;
setInterval(function(){
  var ok=localStorage.getItem('pin_ok')==='1'&&Date.now()-parseInt(localStorage.getItem('pin_ts')||'0')<86400000;
  if(!ok)return;
  // Nicht synchen wenn gerade eine Änderung war (Schutz vor Überschreiben)
  if(Date.now()-_letzteAenderung<3000)return;
  // Nicht synchen wenn Modal offen (lokale Eingabe läuft)
  if(document.getElementById('modal').style.display!=='none')return;
  runter().then(function(){zeige();});
},4000);

if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
</script>
